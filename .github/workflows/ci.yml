name: CI - Validate

run-name: >-
  ${{ github.event_name == 'pull_request' && format('PR #{0}: {1}', github.event.pull_request.number, github.event.pull_request.title) || format('Validation: {0} ({1})', github.ref_name, github.sha) }}

on:
  push:
    branches-ignore: ["main"]
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  static-analysis:
    uses: ./.github/workflows/static-analysis.yml
    with:
      publish-pages: false

  build-and-scan-image:
    needs: static-analysis
    # Pull requests run the complete CI validation, including a local image
    # build and Trivy scan. They never authenticate with or push to Docker Hub.
    if: ${{ github.event_name == 'pull_request' }}
    uses: ./.github/workflows/build-and-push.yml
    with:
      image-name: hello-world-app
      image-tag: ${{ github.sha }}
      dockerhub-username: ${{ vars.DOCKERHUB_USERNAME }}
      publish-image: false
      publish-latest: false
      run-trivy: true
