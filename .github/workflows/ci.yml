name: CI

on:
  push:
    branches-ignore: ["main"]
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analysis:
    uses: ./.github/workflows/static-analysis.yml
    with:
      publish-pages: false
    secrets: inherit

  image-security:
    needs: analysis
    # Pull requests run the complete CI validation, including a local image
    # build and Trivy scan. They never authenticate with or push to Docker Hub.
    if: ${{ github.event_name == 'pull_request' }}
    uses: ./.github/workflows/build-and-push.yml
    with:
      image-name: hello-world-app
      image-tag: ${{ github.sha }}
      dockerhub-username: ${{ vars.DOCKERHUB_USERNAME }}
      publish-image: false
      publish-latest: false
      run-trivy: true
