name: Build, scan, and optionally publish image

on:
  workflow_call:
    outputs:
      image-name:
        description: "Docker image name derived from the Maven artifactId"
        value: ${{ jobs.build-and-scan-image.outputs.image-name }}
    inputs:
      image-tag: { required: true, type: string }
      dockerhub-username: { required: true, type: string }
      publish-image: { required: true, type: boolean }
      publish-latest: { required: true, type: boolean }
      run-trivy: { required: true, type: boolean }
    secrets:
      DOCKERHUB_TOKEN: { required: false }

jobs:
  build-and-scan-image:
    runs-on: ubuntu-latest
    outputs:
      image-name: ${{ steps.project.outputs.image-name }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Derive image name from Maven project
        id: project
        run: |
          artifact_id="$(python3 -c "import xml.etree.ElementTree as ET; root = ET.parse('pom.xml').getroot(); namespace = root.tag.split('}')[0].lstrip('{'); print(root.findtext(f'{{{namespace}}}artifactId'))")"
          image_name="${artifact_id,,}"
          [[ "$image_name" =~ ^[a-z0-9]+([._-][a-z0-9]+)*$ ]] || {
            echo "Maven artifactId '$artifact_id' is not a valid Docker image name." >&2
            exit 1
          }
          echo "image-name=$image_name" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image locally
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: |
            local/${{ steps.project.outputs.image-name }}:${{ inputs.image-tag }}
            ${{ inputs.publish-image && format('{0}/{1}:{2}', inputs.dockerhub-username, steps.project.outputs.image-name, inputs.image-tag) || '' }}
            ${{ inputs.publish-image && inputs.publish-latest && format('{0}/{1}:latest', inputs.dockerhub-username, steps.project.outputs.image-name) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        if: ${{ inputs.run-trivy }}
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'image'
          scan-ref: local/${{ steps.project.outputs.image-name }}:${{ inputs.image-tag }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL

      - name: Log in to Docker Hub
        if: ${{ inputs.publish-image }}
        uses: docker/login-action@v3
        with:
          username: ${{ inputs.dockerhub-username }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish scanned Docker image
        if: ${{ inputs.publish-image }}
        run: |
          docker push "${{ inputs.dockerhub-username }}/${{ steps.project.outputs.image-name }}:${{ inputs.image-tag }}"
          if [ "${{ inputs.publish-latest }}" = "true" ]; then
            docker push "${{ inputs.dockerhub-username }}/${{ steps.project.outputs.image-name }}:latest"
          fi
