name: Build and push image

on:
  workflow_call:
    inputs:
      image-name: { required: true, type: string }
      image-tag: { required: true, type: string }
      publish-latest: { required: true, type: boolean }
    secrets:
      DOCKERHUB_USERNAME: { required: true }
      DOCKERHUB_TOKEN: { required: true }

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image-name }}:${{ inputs.image-tag }}
            ${{ inputs.publish-latest && format('{0}/{1}:latest', secrets.DOCKERHUB_USERNAME, inputs.image-name) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        # CRITICAL SECURITY FIX: Do not use mutable tags for aquasecurity/trivy-action due to the March 2026 supply chain attack.
        # Updated to a safe version (v0.36.0) using standard inputs.
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'image'
          scan-ref: ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image-name }}:${{ inputs.image-tag }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH