name: CD

on:
  push:
    branches: 
      - main

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  analysis:
    uses: ./.github/workflows/static-analysis.yml
    with:
      publish-pages: true
    secrets: inherit

  image:
    needs: analysis
    uses: ./.github/workflows/build-and-push.yml
    with:
      image-name: hello-world-app
      image-tag: ${{ github.sha }}
      publish-latest: true
    secrets: inherit

  deploy:
    needs: image
    uses: ./.github/workflows/deploy-aws.yml
    secrets: inherit # <-- CRITICAL FIX: Added this to pass your AWS role and Docker credentials
    with:
      image: ${{ secrets.DOCKERHUB_USERNAME }}/hello-world-app:${{ github.sha }}
      aws-region: us-east-1
      role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
      cluster: hello-world-cluster
      service: hello-world-service
      task-family: hello-world-task