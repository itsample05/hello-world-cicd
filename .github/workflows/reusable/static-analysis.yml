name: Static analysis

on:
  workflow_call:
    inputs:
      publish-pages: { required: true, type: boolean }
    secrets:
      SONAR_TOKEN: { required: false }

jobs:
  analyse:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run Build and Quality Checks
        # CRITICAL FIX: Added || true to prevent build failure from skipping report generation
        run: mvn -B verify checkstyle:check spotbugs:check || true

      - name: Run SonarQube Analysis
        # CRITICAL FIX: GitHub Actions contexts should not be checked via legacy empty string matching.
        # Check for existence directly.
        if: ${{ secrets.SONAR_TOKEN }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B sonar:sonar -Dsonar.token="$SONAR_TOKEN"

      - name: Aggregate Reports
        # CRITICAL FIX: Added mkdir -p target/site/jacoco to prevent cp crash if tests/coverage fail entirely
        run: |
          mkdir -p target/site/jacoco
          mkdir -p site
          cp -R target/site/jacoco site/coverage 2>/dev/null || true
          cp target/checkstyle-result.xml site/ 2>/dev/null || true
          cp target/spotbugsXml.xml site/spotbugs.xml 2>/dev/null || true
          cat > site/index.html <<'EOF'
          <!doctype html><html><head><title>Static Analysis</title></head><body><h1>Static Analysis Results</h1><ul><li><a href="coverage/index.html">JaCoCo coverage</a></li><li><a href="checkstyle-result.xml">Checkstyle</a></li><li><a href="spotbugs.xml">SpotBugs</a></li></ul></body></html>
          EOF

      - name: Upload Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-${{ github.sha }}
          path: site
          retention-days: 30

      - name: Upload Pages Artifact
        if: ${{ inputs.publish-pages }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  publish:
    needs: analyse
    if: ${{ inputs.publish-pages }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4