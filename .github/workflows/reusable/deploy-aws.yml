name: Deploy ECS
on:
  workflow_call:
    inputs:
      image: { required: true, type: string }
      aws-region: { required: true, type: string }
      role-to-assume: { required: true, type: string }
      cluster: { required: true, type: string }
      service: { required: true, type: string }
      task-family: { required: true, type: string }
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions: { id-token: write, contents: read }
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with: { role-to-assume: ${{ inputs.role-to-assume }}, aws-region: ${{ inputs.aws-region }} }
      - id: task
        run: aws ecs describe-task-definition --task-definition "${{ inputs.task-family }}" --query taskDefinition --output json > task-definition.json
      - run: jq 'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)' task-definition.json > clean.json
      - id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with: { task-definition: clean.json, container-name: app, image: ${{ inputs.image }} }
      - uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with: { task-definition: ${{ steps.render.outputs.task-definition }}, service: ${{ inputs.service }}, cluster: ${{ inputs.cluster }}, wait-for-service-stability: true }
      - name: Start the service and wait for the application
        run: |
          aws ecs update-service --cluster "${{ inputs.cluster }}" --service "${{ inputs.service }}" --desired-count 1
          aws ecs wait services-stable --cluster "${{ inputs.cluster }}" --services "${{ inputs.service }}"
